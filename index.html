<title>KEREN — Lista de Precios</title>

<style>
  :root {
    --warm-white: #F7F7F7;
    --blush: #F9C6DF;
    --rose: #E91E8C;
    --charcoal: #111111;
    --mid: #555555;
    --light-mid: #767676;
    --border: #E5E5E5;
    --wa-green: #25D366;
    --wa-green-dark: #1ebe5d;
    --wa-green-bg: #F0FFF6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    color: white;
    padding: 28px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 300px; height: 100%;
    background: radial-gradient(circle at top right, rgba(233,30,140,0.15), transparent 70%);
  }
  .header-content { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
  .brand-name { font-family: 'Montserrat', sans-serif; font-size: 56px; font-weight: 300; letter-spacing: 8px; line-height: 1; }
  .brand-tagline { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--light-mid); margin-top: 6px; font-weight: 300; }
  .header-meta { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 10px; }
  .header-meta-item { font-size: 11px; color: var(--light-mid); }
  .header-meta-item strong { display: block; font-size: 12px; color: var(--blush); font-weight: 400; margin-bottom: 1px; }

  /* ── TABS ── */
  .tabs-bar {
    background: white; border-bottom: 2px solid var(--border);
    display: flex; gap: 0; padding: 0 40px;
    position: sticky; top: 0; z-index: 51;
  }
  .tab-btn {
    padding: 14px 20px; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--light-mid); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--charcoal); }
  .tab-btn.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 600; }

  /* ── CONTROLS ── */
  .controls {
    background: white; padding: 18px 40px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    position: sticky; top: 47px; z-index: 50;
  }
  .search-box { position: relative; flex: 1; min-width: 240px; max-width: 380px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--light-mid); font-size: 14px; }
  #searchInput {
    width: 100%; padding: 10px 14px 10px 40px;
    border: 1.5px solid var(--border); border-radius: 24px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--charcoal); outline: none; background: var(--warm-white);
    transition: all 0.2s;
  }
  #searchInput:focus { border-color: var(--rose); background: white; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border: 1.5px solid var(--border); background: white;
    border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: var(--mid); cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--rose); color: var(--rose); }
  .filter-btn.active { background: var(--rose); border-color: var(--rose); color: white; }
  .results-count { font-size: 11px; color: var(--light-mid); margin-left: auto; }

  /* ── MAIN ── */
  .main { padding: 28px 40px 60px; }
  .marca-section { margin-bottom: 36px; }
  .marca-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--charcoal); }
  .marca-title-plain {
    font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 1px;
    color: var(--charcoal);
  }
  .marca-badge { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: white; background: var(--charcoal); padding: 3px 10px; border-radius: 4px; }
  .cat-label { font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--rose); font-weight: 500; margin: 14px 0 8px; }

  /* ── PRODUCT GRID ── */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .product-card {
    background: white; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; position: relative; transition: all 0.2s;
  }
  .product-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--rose); border-radius: 10px 10px 0 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .product-card:hover { border-color: var(--blush); box-shadow: 0 4px 16px rgba(196,131,106,0.1); transform: translateY(-1px); }
  .product-card:hover::before { opacity: 1; }
  .product-code { font-size: 15px; font-weight: 600; color: var(--charcoal); letter-spacing: 0.5px; }
  .product-category { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--rose); font-weight: 500; margin-top: 3px; }
  .product-price { margin-top: 8px; font-size: 18px; font-weight: 700; color: var(--rose); }

  /* ── SIN STOCK ── */
  .sin-stock-badge {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.82); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    border-radius: 10px; z-index: 2;
  }
  .sin-stock-badge span { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); }
  .product-card.sin-stock { opacity: 0.7; }
  .product-card.sin-stock .product-price { text-decoration: line-through; color: var(--light-mid); }

  /* ── CONSULTAR BTN ── */
  .consultar-btn {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 10px; padding: 6px 12px;
    background: transparent; border: 1.5px solid var(--border);
    border-radius: 20px; color: var(--mid);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s; width: 100%; justify-content: center;
  }
  .consultar-btn:hover { border-color: var(--wa-green); color: var(--wa-green); background: var(--wa-green-bg); }

  /* ── PEDIDO BTN (header) ── */
  .pedido-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--wa-green); color: white; border: none;
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    text-decoration: none; flex-shrink: 0; margin-left: auto;
    transition: all 0.2s; box-shadow: 0 2px 10px rgba(37,211,102,0.35);
  }
  .pedido-btn svg { width: 22px; height: 22px; fill: white; }
  .pedido-btn:hover { background: var(--wa-green-dark); transform: scale(1.08); box-shadow: 0 4px 16px rgba(37,211,102,0.45); }

  /* ── CATÁLOGOS VIEW ── */
  .catalogo-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; padding: 32px 40px 60px;
  }
  .catalogo-card {
    background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 28px 20px; text-align: center; text-decoration: none;
    transition: all 0.25s; display: flex; flex-direction: column;
    align-items: center; gap: 10px; position: relative; overflow: hidden;
  }
  .catalogo-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--rose); transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s ease;
  }
  .catalogo-card:hover { border-color: var(--rose); box-shadow: 0 8px 28px rgba(233,30,140,0.12); transform: translateY(-3px); }
  .catalogo-card:hover::before { transform: scaleX(1); }
  .catalogo-icon { font-size: 32px; }
  .catalogo-marca { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; color: var(--charcoal); letter-spacing: 0.5px; }
  .catalogo-sub { font-size: 11px; color: var(--light-mid); }
  .catalogo-arrow { font-size: 18px; color: var(--rose); margin-top: 4px; }
  .catalogo-empty {
    text-align: center; padding: 60px 20px; color: var(--light-mid);
    font-size: 14px; grid-column: 1/-1;
  }
  .catalogo-empty strong { display: block; font-size: 20px; font-weight: 600; color: var(--charcoal); margin-bottom: 8px; }

  /* ── NO RESULTS ── */
  .no-results { text-align: center; padding: 80px 20px; color: var(--light-mid); }
  .no-results h3 { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 300; margin-bottom: 8px; }

  /* ── FOOTER ── */
  .footer {
    background: var(--charcoal); color: var(--light-mid); padding: 28px 40px;
    font-size: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .brand-name { font-size: 44px; }
    .header, .controls, .main { padding-left: 16px; padding-right: 16px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .tabs-bar { padding: 0 16px; overflow-x: auto; }
    .catalogo-grid { padding: 20px 16px 40px; }
    .marca-title-plain { font-size: 20px; }
    .catalogo-card { padding: 22px 16px; }
    /* Tap targets más grandes para mobile (mínimo recomendado: 44x44px) */
    .filter-btn { padding: 10px 16px; font-size: 13px; }
    .consultar-btn { padding: 10px 12px; font-size: 12px; }
    .tab-btn { padding: 16px 18px; }
  }
</style>
</head>

// ═══════════════════════════════════════════════════════════════════

// Convertir array a objetos para uso interno
const DATA = PRODUCTOS.map(p => ({
  marca: p[0],
  codigo: p[1],
  categoria: p[2],
  precio: p[3],
  sinStock: p[4] || false
}));

let currentFilter = 'all';

function formatPrice(n) {
  return '$ ' + n.toLocaleString('es-AR');
}

function getMarcas() {
  const seen = new Set();
  const orden = [];
  DATA.forEach(p => {
    if (!seen.has(p.marca)) {
      seen.add(p.marca);
      orden.push(p.marca);
    }
  });
  return orden;
}

function buildFilters() {
  const container = document.getElementById('filterBtns');
  const marcas = getMarcas();
  let html = `<button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all', this)">Todas</button>`;
  marcas.forEach(m => {
    const active = currentFilter === m ? 'active' : '';
    const display = m.charAt(0) + m.slice(1).toLowerCase();
    html += `<button class="filter-btn ${active}" onclick="setFilter('${m}', this)">${display}</button>`;
  });
  container.innerHTML = html;
}

function setFilter(marca, btn) {
  currentFilter = marca;
  document.querySelectorAll('#filterBtns .filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = DATA.filter(p => {
    const matchMarca = currentFilter === 'all' || p.marca === currentFilter;
    const matchQ = !q ||
      p.codigo.toLowerCase().includes(q) ||
      p.marca.toLowerCase().includes(q) ||
      p.categoria.toLowerCase().includes(q);
    return matchMarca && matchQ;
  });
  renderProducts(filtered);
}

function renderProducts(items) {
  const container = document.getElementById('mainContent');
  const countEl = document.getElementById('resultsCount');
  countEl.textContent = `${items.length} artículo${items.length !== 1 ? 's' : ''}`;

  if (items.length === 0) {
    container.innerHTML = `<div class="no-results"><h3>Sin resultados</h3><p>Intentá con otro código, marca o categoría</p></div>`;
    return;
  }

  // Agrupar por marca y luego por categoría
  const byMarca = {};
  const marcaOrden = getMarcas();
  items.forEach(p => {
    if (!byMarca[p.marca]) byMarca[p.marca] = {};
    if (!byMarca[p.marca][p.categoria]) byMarca[p.marca][p.categoria] = [];
    byMarca[p.marca][p.categoria].push(p);
  });

  let html = '';
  marcaOrden.forEach(marca => {
    if (!byMarca[marca]) return;
    const cats = byMarca[marca];
    const total = Object.values(cats).reduce((s, a) => s + a.length, 0);

    // Título de la marca: siempre texto plano. Los catálogos viven en la tab "Catálogos".
    const marcaTitleHtml = `<span class="marca-title-plain">${marca}</span>`;

    html += `<div class="marca-section">
      <div class="marca-header">
        ${marcaTitleHtml}
        <span class="marca-badge">${total} artículos</span>
      </div>`;

    Object.entries(cats).forEach(([cat, prods]) => {
      if (Object.keys(cats).length > 1) {
        html += `<div class="cat-label">${cat}</div>`;
      }
      html += `<div class="product-grid">`;
      prods.forEach(p => {
        const waMsg = encodeURIComponent(`Hola! Quiero consultar por ${p.marca} Art. ${p.codigo} (${p.categoria}) - ${formatPrice(p.precio)}`);
        const waUrl = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;
        const stockOverlay = p.sinStock
          ? `<div class="sin-stock-badge"><span>⊘</span><span>Sin stock</span></div>` : '';
        html += `<div class="product-card${p.sinStock ? ' sin-stock' : ''}">
          ${stockOverlay}
          <div class="product-code">${p.codigo}</div>
          <div class="product-category">${p.categoria}</div>
          <div class="product-price">${formatPrice(p.precio)}</div>
          ${!p.sinStock ? `<a class="consultar-btn" href="${waUrl}" target="_blank" rel="noopener">💬 Consultar</a>` : ''}
        </div>`;
      });
      html += `</div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function renderCatalogos() {
  const container = document.getElementById('mainContent');
  const marcas = getMarcas();
  let html = '<div class="catalogo-grid">';

  let hasAny = false;
  marcas.forEach(marca => {
    const cats = (CATALOGOS[marca] || []).filter(c => c && c.url);
    if (cats.length === 0) return;
    hasAny = true;
    cats.forEach(cat => {
      html += `<a class="catalogo-card" href="${cat.url}" target="_blank" rel="noopener">
        <div class="catalogo-icon">📖</div>
        <div class="catalogo-marca">${marca}</div>
        <div class="catalogo-sub">${cat.label || 'Catálogo'}</div>
        <div class="catalogo-arrow">→</div>
      </a>`;
    });
  });

  if (!hasAny) {
    html += `<div class="catalogo-empty"><strong>Sin catálogos cargados</strong>Próximamente más información</div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const controls = document.getElementById('controlsBar');
  if (tab === 'precios') {
    controls.style.display = 'flex';
    filterProducts();
  } else {
    controls.style.display = 'none';
    renderCatalogos();
  }
}

// ── INIT ──
buildFilters();
filterProducts();
