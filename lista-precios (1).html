<head>

<title>Lencería Keren · Lista Mayorista</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============ CONFIG VISUAL ============ */
  :root{
    --marfil:#FBF5F6;
    --papel:#FFFFFF;
    --tinta:#241820;
    --gris:#8C7680;
    --ciruela:#E74275;
    --ciruela-suave:#FCE5EC;
    --blush:#F6BBD1;
    --linea:#F0DEE4;
    --radio:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--marfil);
    color:var(--tinta);
    font-size:15px;
    line-height:1.4;
  }

  /* ============ HEADER ============ */
  header{
    background:var(--papel);
    border-bottom:1px solid var(--linea);
    padding:20px 16px 0;
    position:sticky; top:0; z-index:20;
  }
  .brand{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; max-width:760px; margin:0 auto;
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:700; font-size:1.6rem; letter-spacing:.01em;
  }
  .brand h1 em{font-style:normal; color:var(--ciruela)}
  .searchwrap{
    max-width:760px; margin:14px auto 0; padding-bottom:12px;
  }
  .searchbox{
    display:flex; align-items:center; gap:10px;
    background:var(--marfil);
    border:1.5px solid var(--linea);
    border-radius:var(--radio);
    padding:12px 14px;
    transition:border-color .15s;
  }
  .searchbox:focus-within{border-color:var(--ciruela)}
  .searchbox svg{flex-shrink:0; color:var(--gris)}
  .searchbox input{
    flex:1; border:none; background:transparent; outline:none;
    font-family:'JetBrains Mono',monospace; font-size:.95rem;
    color:var(--tinta);
  }
  .searchbox input::placeholder{color:var(--gris); font-family:'Inter',sans-serif}
  .clearbtn{
    display:none; border:none; background:none; color:var(--gris);
    font-size:1.1rem; cursor:pointer; padding:0 2px; line-height:1;
  }
  .searchbox.has-text .clearbtn{display:block}

  /* ============ INFO LOCAL ============ */
  .localinfo{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; max-width:760px; margin:8px auto 0;
  }
  .localinfo .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:.62rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gris); flex-shrink:0;
  }
  .localinfo .addr{
    font-size:.75rem; color:var(--gris);
    display:flex; align-items:center; gap:5px;
    text-align:right;
  }
  .localinfo .addr svg{flex-shrink:0}
  .social{display:flex; gap:9px; flex-shrink:0}
  .social a{
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:50%;
    border:none; color:#fff;
    transition:transform .15s, filter .15s;
    flex-shrink:0;
  }
  .social a:hover, .social a:active{
    transform:scale(1.08); filter:brightness(1.05);
  }
  .social a svg{width:19px; height:19px}
  .social a.ig{
    background:radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
  }
  .social a.wa{ background:#25D366; }

  /* ============ TABS ============ */
  .tabs{
    display:flex; gap:2px;
    max-width:760px; margin:12px auto 0;
    border-bottom:1px solid var(--linea);
  }
  .tab{
    font-family:'Inter',sans-serif; font-size:.85rem; font-weight:600;
    padding:10px 18px; background:none; border:none; cursor:pointer;
    color:var(--gris);
    border-bottom:2.5px solid transparent;
    margin-bottom:-1px;
    transition:color .15s, border-color .15s;
  }
  .tab.active{
    color:var(--ciruela);
    border-bottom-color:var(--ciruela);
  }

  /* ============ CHIPS ============ */
  .chips-scroll{
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    margin:0 -16px; padding:0 16px;
  }
  .chips-scroll::-webkit-scrollbar{display:none}
  .chips{display:flex; gap:8px; padding-bottom:12px; width:max-content}
  .chip{
    font-family:'Inter',sans-serif; font-size:.78rem; font-weight:500;
    padding:7px 14px; border-radius:100px;
    border:1px solid var(--linea); background:var(--papel);
    color:var(--tinta); cursor:pointer; white-space:nowrap;
    transition:all .12s;
  }
  .chip.active{
    background:var(--ciruela); border-color:var(--ciruela); color:#fff;
  }

  /* ============ META BAR ============ */
  .meta{
    max-width:760px; margin:0 auto; padding:14px 16px 4px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .meta .count{
    font-family:'JetBrains Mono',monospace; font-size:.7rem;
    letter-spacing:.08em; color:var(--gris); text-transform:uppercase;
  }

  /* ============ LISTA ============ */
  main{max-width:760px; margin:0 auto; padding:6px 16px 80px}
  .marca-group{margin-top:30px}
  .marca-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:1.1rem;
    color:var(--ciruela);
    display:flex; align-items:baseline; gap:10px;
    padding-bottom:8px; border-bottom:2px solid var(--tinta);
    margin-bottom:12px;
  }
  .marca-title .n{
    font-family:'JetBrains Mono',monospace; font-size:.65rem;
    color:var(--gris); letter-spacing:.05em;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
  }
  .card{
    background:var(--papel);
    border:1px solid var(--linea);
    border-radius:var(--radio);
    padding:10px 12px;
    display:flex; flex-direction:column; gap:2px;
  }
  .card .cod{
    font-family:'JetBrains Mono',monospace; font-weight:600;
    font-size:.95rem;
  }
  .card .cat{
    font-size:.66rem; color:var(--gris);
    text-transform:uppercase; letter-spacing:.06em;
  }
  .card .precio{
    font-family:'JetBrains Mono',monospace; font-weight:600;
    font-size:1rem; color:var(--ciruela);
    margin-top:4px;
  }

  /* ============ CATÁLOGOS ============ */
  .catalogos-grid{
    display:grid; grid-template-columns:1fr; gap:10px;
    margin-top:20px;
  }
  .catalogo-card{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    background:var(--papel);
    border:1px solid var(--linea);
    border-radius:var(--radio);
    padding:16px 18px;
    text-decoration:none; color:var(--tinta);
    transition:border-color .15s, transform .15s;
  }
  .catalogo-card:hover, .catalogo-card:active{
    border-color:var(--ciruela);
    transform:translateY(-1px);
  }
  .catalogo-card .info{display:flex; flex-direction:column; gap:2px; min-width:0}
  .catalogo-card .nombre{
    font-family:'Fraunces',serif; font-weight:600; font-size:1rem;
  }
  .catalogo-card .desc{
    font-size:.75rem; color:var(--gris);
  }
  .catalogo-card .flecha{
    flex-shrink:0; color:var(--ciruela);
    display:flex; align-items:center;
  }

  /* ============ ESTADOS ============ */
  .estado{
    text-align:center; padding:70px 20px; color:var(--gris);
  }
  .estado .big{
    font-family:'Fraunces',serif; font-size:1.2rem; color:var(--tinta);
    margin-bottom:8px;
  }
  .spinner{
    width:28px;height:28px;margin:0 auto 16px;
    border:3px solid var(--linea); border-top-color:var(--ciruela);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:2s}}

  footer{
    text-align:center; padding:30px 16px 50px;
    font-size:.72rem; color:var(--gris);
    border-top:1px solid var(--linea);
  }
  footer .fmono{font-family:'JetBrains Mono',monospace; letter-spacing:.1em; text-transform:uppercase; font-size:.62rem}

  @media(min-width:600px){
    body{font-size:16px}
    .brand h1{font-size:1.85rem}
    .cards{grid-template-columns:repeat(3, 1fr); gap:10px}
  }
</style>
</head>

/* Columnas de la tabla derecha dentro del archivo (A=0, B=1 ... F=5) */
const COL = { marca:5, articulo:6, categoria:7, precio:8 };
const FILAS_ENCABEZADO = 2; // fila 1: títulos, fila 2: headers

let DATA = [];          // {marca, articulo, categoria, precio}
let marcaSel = "Todas";

/* ---------- parser TSV (campos separados por tabulaciones) ---------- */
function parseCSV(text){
  return text.split(/\r?\n/).map(line => line.split("\t"));
}

function limpiarPrecio(v){
  if(v==null || String(v).trim()==="") return null;
  const n = parseFloat(String(v).replace(/[^0-9.-]/g,""));
  return isNaN(n) ? null : n;
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
                  .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmtPrecio(n){
  return "$" + n.toLocaleString("es-AR", {maximumFractionDigits:0});
}

async function cargar(){
  try{
    if(CSV_URL.startsWith("PEGAR")) throw new Error("config");
    if(location.protocol === "file:") throw new Error("file_protocol");
    const res = await fetch(CSV_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("http_" + res.status);
    const rows = parseCSV(await res.text());
    DATA = [];
    for(let i=FILAS_ENCABEZADO; i<rows.length; i++){
      const r = rows[i];
      const marca=(r[COL.marca]||"").trim();
      const art  =(r[COL.articulo]||"").trim();
      const precio=limpiarPrecio(r[COL.precio]);
      if(!marca || !art || precio==null) continue;
      DATA.push({
        marca,
        articulo: art.replace(/\.0$/,""),
        categoria:(r[COL.categoria]||"").trim(),
        precio
      });
    }
    if(!DATA.length) throw new Error("vacio");
  }catch(e){
    console.warn("No se pudo traer datos en vivo (" + e.message + "), usando snapshot embebido.");
    DATA = DATA_SNAPSHOT.slice();
  }

  if(!DATA.length){
    document.getElementById("lista").innerHTML =
      `<div class="estado"><div class="big">Ups</div>${esc("No hay datos disponibles ni en vivo ni en el snapshot.")}</div>`;
    return;
  }

  construirChips();
  render();
}

function construirChips(){
  const marcas=["Todas",...[...new Set(DATA.map(d=>d.marca))].sort()];
  const cm=document.getElementById("chips-marca");
  cm.innerHTML = marcas.map(m=>`<button class="chip${m===marcaSel?" active":""}" data-m="${esc(m)}">${esc(m)}</button>`).join("");
  cm.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{marcaSel=b.dataset.m; construirChips(); render();});
}

function normalizar(s){
  return s.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function render(){
  const q = normalizar(document.getElementById("q").value.trim());
  const filtrado = DATA.filter(d=>{
    if(marcaSel!=="Todas" && d.marca!==marcaSel) return false;
    if(q && !normalizar(d.articulo).includes(q) && !normalizar(d.marca).includes(q)) return false;
    return true;
  });

  document.getElementById("count").textContent =
    filtrado.length + (filtrado.length===1?" artículo":" artículos");

  if(!filtrado.length){
    document.getElementById("lista").innerHTML =
      `<div class="estado"><div class="big">Sin resultados</div>Probá con otro código o quitá los filtros.</div>`;
    return;
  }

  // agrupar por marca respetando orden alfabético
  const grupos = {};
  filtrado.forEach(d=>{ (grupos[d.marca]=grupos[d.marca]||[]).push(d); });

  let html="";
  Object.keys(grupos).sort().forEach(m=>{
    const items=grupos[m].sort((a,b)=>{
      const c = a.categoria.localeCompare(b.categoria, "es", {sensitivity:"base"});
      if(c!==0) return c;
      return a.articulo.localeCompare(b.articulo,undefined,{numeric:true});
    });
    html+=`<section class="marca-group">
      <h2 class="marca-title">${esc(m)}<span class="n">${items.length}</span></h2>
      <div class="cards">`;
    items.forEach(d=>{
      html+=`<div class="card">
        <span class="cod">${esc(d.articulo)}</span>
        ${d.categoria?`<span class="cat">${esc(d.categoria)}</span>`:""}
        <span class="precio">${fmtPrecio(d.precio)}</span>
      </div>`;
    });
    html+=`</div></section>`;
  });
  document.getElementById("lista").innerHTML=html;
}

}
